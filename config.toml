# Public RPCs (no signup needed) — fine for testing, swap to Alchemy/Infura for production reliability.
# publicnode.com: no auth, supports WSS, ~no rate-limit. eth.llamarpc.com: HTTPS fallback.
[chain]
read_rpc_ws   = "wss://ethereum-rpc.publicnode.com"
read_rpc_http = ["https://ethereum-rpc.publicnode.com", "https://eth.llamarpc.com", "https://rpc.ankr.com/eth"]

[relays]
# Private mempool relays — these accept any raw tx, no auth.
private         = ["https://rpc.mevblocker.io/fast", "https://rpc.flashbots.net/fast"]
public_fallback = "https://ethereum-rpc.publicnode.com"

[wallet]
keystore_path = "./keys/miner.json"

[mining]
max_tip_gwei  = 3.0
ev_min_ratio  = 1.2
confirmations = 2

[gpu]
device_id         = 0
threads_per_block = 256
blocks_per_sm     = 4      # 34 × 4 = 136 blocks × 256 threads = 34,816 concurrent grinders
batch_per_thread  = 1024   # each thread processes 1024 nonces per outer iter (~10ms per batch on 4060 Ti)
poll_interval_ms  = 50
sm_count          = 34     # RTX 4060 Ti 16GB (AD106). Other Ada: 4090=128, 4080=76, 4070 Ti=60, 4070=46. Ampere: 3090=82, 3080=68.

[metrics]
jsonl_path = "./logs/metrics.jsonl"
stdout_hz  = 1
